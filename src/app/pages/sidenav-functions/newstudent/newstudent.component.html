<div class="container">
  <h4 class="text-success pt-5 d-flex justify-content-between">
    Create New Student
    <button class="btn btn-dark" (click)="students()">
      <i class="bi-arrow-left bi"></i> Students' List
    </button>
  </h4>

  <div *ngIf="status === 'success'" class="alert alert-success text-center">
    <p class="">{{ addStudentStatus }}</p>
    <div class="row">
      <div class="col-md-6">
        Username: <span class="text-center"> {{ sno }}</span> <br />
        Password: <span class="text-center"> {{ spass }}</span>
      </div>
      <div class="col-md-6">
        <button (click)="sendEmail()" class="btn btn-primary m-1">
          Send to Email
        </button>
        <button (click)="sendSMS()" class="btn btn-secondary m-1">
          Send to SMS
        </button>
      </div>
    </div>
  </div>

  <div
    *ngIf="status === 'error' || status === null"
    class="alert alert-danger text-center">
    {{ addStudentStatus }}
  </div>

  <!-- Hide form after student is created -->
  <form
    (ngSubmit)="createStudent()"
    *ngIf="!(status === 'success' && studentId)">
    <div class="row">
      <!-- First Name Input -->
      <div class="mb-3 col-md-4 form-floating">
        <input
          id="firstName"
          class="form-control"
          [(ngModel)]="firstName"
          name="firstName"
          required
          placeholder="First Name" />
        <label for="firstName">First Name</label>
      </div>

      <!-- Last Name Input -->
      <div class="mb-3 col-md-4 form-floating">
        <input
          id="lastName"
          class="form-control"
          [(ngModel)]="lastName"
          name="lastName"
          required
          placeholder="Last Name" />
        <label for="lastName">Last Name</label>
      </div>

      <!-- Student Number Input -->
      <div class="mb-3 col-md-4 form-floating">
        <input
          id="studentNumber"
          class="form-control"
          [(ngModel)]="studentNumber"
          name="studentNumber"
          required
          placeholder="Student Number" />
        <label for="studentNumber">Student Number</label>
      </div>

      <!-- Birth Date Input -->
      <div class="mb-3 col-md-4 form-floating">
        <input
          id="birthDate"
          type="date"
          class="form-control"
          [(ngModel)]="birthDate"
          name="birthDate"
          required
          placeholder="Birthday" />
        <label for="birthDate">Birthday</label>
      </div>

      <!-- Residence Input -->
      <div class="mb-3 col-md-4 form-floating">
        <input
          id="residence"
          class="form-control"
          [(ngModel)]="residence"
          name="residence"
          required
          placeholder="Residence" />
        <label for="residence">Residence</label>
      </div>

      <!-- Health Status Select -->
      <div class="mb-3 col-md-4">
        <label for="healthStatus" class="form-label">Health Status</label>
        <select
          id="healthStatus"
          class="form-select"
          [(ngModel)]="healthStatus"
          name="healthStatus"
          required>
          <option value="" disabled selected>Select Health Status</option>
          <option value="healthy">Healthy</option>
          <option value="sick">Sick</option>
          <option value="medication">On Medication</option>
          <option value="deceased">Deceased</option>
        </select>
      </div>

      <!-- Phone Input -->
      <div class="mb-3 col-md-4 form-floating">
        <input
          id="phone"
          type="tel"
          class="form-control"
          [(ngModel)]="phone"
          name="phone"
          required
          placeholder="Phone" />
        <label for="phone">Phone</label>
      </div>

      <!-- Email Input -->
      <div class="mb-3 col-md-4 form-floating">
        <input
          id="email"
          type="email"
          class="form-control"
          [(ngModel)]="email"
          name="email"
          required
          placeholder="Email" />
        <label for="email">Email</label>
      </div>

      <!-- Password Input (Hidden) -->
      <input
        hidden
        id="password"
        type="password"
        class="form-control"
        [(ngModel)]="studentPassword"
        name="password" />

      <!-- Club Input -->
      <div class="mb-3 col-md-4">
        <label for="club" class="form-label">Club</label>
        <select
          id="club"
          class="form-select"
          [(ngModel)]="club"
          name="club"
          required>
          <option value="" disabled selected>Select Club</option>
          <option *ngFor="let club of clubs" [value]="club">{{ club }}</option>
        </select>
      </div>

      <!-- Level Select -->
      <div class="mb-3 col-md-4">
        <label for="level" class="form-label">Level</label>
        <select
          id="level"
          class="form-select"
          [(ngModel)]="level"
          name="level"
          required>
          <option value="" disabled selected>Select Level</option>
          <option *ngFor="let lvl of levels" [value]="lvl">{{ lvl }}</option>
        </select>
      </div>

      <!-- Enrollment Status Select -->
      <div class="mb-3 col-md-4">
        <label for="enrollmentStatus" class="form-label"
          >Enrollment Status</label
        >
        <select
          id="enrollmentStatus"
          class="form-select"
          [(ngModel)]="enrollmentStatus"
          name="enrollmentStatus"
          required>
          <option value="" disabled selected>Choose Enrollment Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="suspended">Suspended</option>
          <option value="expelled">Expelled</option>
          <option value="alumni">Alumni</option>
        </select>
      </div>

      <!-- Year Select -->
      <div class="mb-3 col-md-4">
        <label for="year" class="form-label">Year</label>
        <select
          id="year"
          class="form-select"
          [(ngModel)]="year"
          name="year"
          required>
          <option value="" disabled selected>Select Year</option>
          <option *ngFor="let yr of years" [value]="yr">{{ yr }}</option>
        </select>
      </div>

      <!-- Mother Input -->
      <div class="mb-3 col-md-4 form-floating">
        <input
          id="mother"
          class="form-control"
          [(ngModel)]="mother"
          name="mother"
          placeholder="Mother's Name" />
        <label for="mother">Mother's Name</label>
      </div>

      <!-- Father Input -->
      <div class="mb-3 col-md-4 form-floating">
        <input
          id="father"
          class="form-control"
          [(ngModel)]="father"
          name="father"
          placeholder="Father's Name" />
        <label for="father">Father's Name</label>
      </div>

      <!-- Hidden School Admin Input -->
      <input
        hidden
        id="schoolAdmin"
        type="number"
        class="form-control"
        [(ngModel)]="schoolAdminId"
        name="schoolAdminId" />

      <!-- Submit Button -->
      <div class="mb-3 col-md-4"></div>
      <div class="mb-3 col-md-4">
        <button type="submit" class="btn btn-success">Create Student</button>
      </div>
    </div>
  </form>

  <!-- File Upload UI: Only show after student is created -->
  <div *ngIf="status === 'success' && studentId" class="mt-4">
    <h5 class="mb-3">Upload Student Media</h5>
    <div class="row g-3">
      <!-- Profile Picture Upload -->
      <div class="col-md-4">
        <label class="form-label">Profile Picture</label>
        <div class="card p-2 text-center">
          <img
            *ngIf="profilePictureUrl"
            [src]="profilePictureUrl"
            class="img-thumbnail mb-2"
            style="max-height: 180px; object-fit: contain"
            alt="Profile Picture Preview" />
          <div *ngIf="!profilePictureUrl" class="mb-2 text-muted">
            No picture uploaded
          </div>
          <input
            type="file"
            accept="image/*"
            (change)="onProfilePictureSelected($event)"
            [disabled]="profilePictureUploading"
            class="form-control mb-2" />
          <div class="d-flex justify-content-center gap-2">
            <button
              class="btn btn-success btn-sm"
              (click)="uploadProfilePicture()"
              [disabled]="!profilePictureFile || profilePictureUploading">
              {{ profilePictureUploaded ? "Update" : "Upload" }}
            </button>
            <button
              class="btn btn-danger btn-sm"
              (click)="removeProfilePicture()"
              [disabled]="!profilePictureUrl || profilePictureUploading">
              Remove
            </button>
          </div>
          <div *ngIf="profilePictureUploading" class="mt-2">
            <div
              class="spinner-border spinner-border-sm text-success"
              role="status"></div>
            Uploading...
          </div>
        </div>
      </div>

      <!-- Student Video Upload -->
      <div class="col-md-4">
        <label class="form-label">Student Video</label>
        <div class="card p-2 text-center">
          <video
            *ngIf="studentVideoUrl"
            [src]="studentVideoUrl"
            controls
            class="w-100 mb-2"
            style="max-height: 180px"></video>
          <div *ngIf="!studentVideoUrl" class="mb-2 text-muted">
            No video uploaded
          </div>
          <input
            type="file"
            accept="video/*"
            (change)="onStudentVideoSelected($event)"
            [disabled]="studentVideoUploading"
            class="form-control mb-2" />
          <div class="d-flex justify-content-center gap-2">
            <button
              class="btn btn-success btn-sm"
              (click)="uploadStudentVideo()"
              [disabled]="!studentVideoFile || studentVideoUploading">
              {{ studentVideoUploaded ? "Update" : "Upload" }}
            </button>
            <button
              class="btn btn-danger btn-sm"
              (click)="removeStudentVideo()"
              [disabled]="!studentVideoUrl || studentVideoUploading">
              Remove
            </button>
          </div>
          <div *ngIf="studentVideoUploading" class="mt-2">
            <div
              class="spinner-border spinner-border-sm text-success"
              role="status"></div>
            Uploading...
          </div>
        </div>
      </div>

      <!-- Additional Images Upload -->
      <div class="col-md-4">
        <label class="form-label">Additional Images (up to 10)</label>
        <div class="card p-2">
          <div class="row g-2 mb-2">
            <div
              class="col-4"
              *ngFor="let img of additionalImages; let i = index">
              <div class="position-relative">
                <img
                  [src]="img.url"
                  class="img-thumbnail"
                  style="height: 70px; object-fit: cover" />
                <button
                  type="button"
                  class="btn-close position-absolute top-0 end-0 bg-white rounded-circle p-1"
                  style="font-size: 0.7rem"
                  (click)="removeAdditionalImage(i)"
                  [disabled]="img.uploading"></button>
                <div
                  *ngIf="img.uploading"
                  class="position-absolute top-50 start-50 translate-middle">
                  <div
                    class="spinner-border spinner-border-sm text-success"></div>
                </div>
              </div>
            </div>
            <div class="col-4" *ngIf="additionalImages.length < 10">
              <label
                class="w-100 h-100 d-flex align-items-center justify-content-center border rounded bg-light"
                style="height: 70px; cursor: pointer">
                <span class="text-muted">+</span>
                <input
                  type="file"
                  accept="image/*"
                  (change)="onAdditionalImageSelected($event)"
                  [disabled]="additionalImagesUploading"
                  style="display: none" />
              </label>
            </div>
          </div>
          <button
            class="btn btn-success btn-sm w-100"
            (click)="uploadAdditionalImages()"
            [disabled]="
              !pendingAdditionalImages.length || additionalImagesUploading
            ">
            {{ additionalImagesUploaded ? "Update" : "Upload" }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
